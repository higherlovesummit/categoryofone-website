  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --jet:#000000; --gold:#A07F56; --russet:#915335; --linen:#EDE3DA; --white:#FFFFFF; }
    body { background: var(--jet); color: var(--white); font-family: "EB Garamond", Georgia, serif; font-size: 16px; line-height: 1.6; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 60px; background: #000000; border-bottom: 1px solid rgba(160,127,86,0.2); }
    .nav-logo img { height: 56px; width: auto; display: block; }
    .btn-primary { font-family: "Raleway", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--jet); background: var(--gold); padding: 13px 32px; text-decoration: none; transition: background 0.2s, color 0.2s; }
    .btn-primary:hover { background: var(--russet); color: var(--white); }
    .contact { max-width: 1000px; margin: 0 auto; text-align: center; padding: 150px 40px 90px; }
    .c-eyebrow { font-family: "Raleway", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.26em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
    .contact h1 { font-family: "Cormorant Garamond", serif; font-weight: 600; font-size: clamp(34px, 5vw, 50px); color: var(--white); line-height: 1.05; margin-bottom: 16px; }
    .c-sub { font-family: "EB Garamond", serif; font-size: 19px; line-height: 1.7; color: rgba(237,227,218,0.82); max-width: 560px; margin: 0 auto 40px; }
    .cal-tabs { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
    .cal-tab { font-family: "Raleway", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); background: transparent; border: 1px solid rgba(160,127,86,0.5); padding: 13px 26px; cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s; }
    .cal-tab:hover { border-color: var(--gold); }
    .cal-tab.active { background: var(--gold); color: var(--jet); border-color: var(--gold); }
    .cal-wrap { max-width: 900px; margin: 0 auto; }
    .cal-panel[hidden] { display: none; }
    .cal-panel iframe { width: 100%; height: 650px; border: 0; display: block; }
    footer { background: #000000; border-top: 1px solid rgba(160,127,86,0.18); padding: 60px 60px 48px; }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 24px; text-align: center; }
    .footer-logo { order: 0; margin-bottom: 8px; }
    .footer-logo img { height: 52px; width: auto; display: block; }
    .footer-right { display: flex; flex-direction: column; align-items: center; gap: 12px; order: 1; }
    .footer-links { display: flex; gap: 26px; }
    .footer-links a { font-family: "Raleway", sans-serif; font-size: 12px; font-weight: 400; letter-spacing: 0.06em; color: var(--white); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy { font-family: "Raleway", sans-serif; font-size: 12px; letter-spacing: 0.04em; color: var(--white); text-align: center; }
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .nav-logo img { height: 44px; }
      .btn-primary { font-size: 11px; padding: 11px 18px; letter-spacing: 0.14em; }
      .contact { padding: 120px 20px 70px; }
      .cal-tab { padding: 12px 18px; font-size: 10px; letter-spacing: 0.14em; }
      footer { padding: 44px 24px 32px; }
    }
  </style>

  document.querySelectorAll('.cal-tab').forEach(function(btn){

      document.querySelectorAll('.cal-tab').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.cal-panel').forEach(function(p){ p.hidden = true; });
